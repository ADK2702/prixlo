name: Weekly Price Refresh

on:
  schedule:
    # Every Monday at 06:00 UTC (02:00 EST / 03:00 EDT)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install psycopg2-binary rapidfuzz python-dotenv requests

      - name: Create .env for import scripts
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > webapp/.env.local

      - name: Import flyer data
        run: python import_db.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Normalize & cluster products
        run: python normalize_products.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Refresh FTS index
        run: |
          psql "$DATABASE_URL" -c "REINDEX INDEX CONCURRENTLY idx_prices_fts;"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Report row counts
        run: |
          psql "$DATABASE_URL" -c "
            SELECT COUNT(*) AS total_prices,
                   COUNT(DISTINCT merchant_id) AS merchants,
                   COUNT(DISTINCT cluster_id) AS clusters
            FROM prices
            WHERE (valid_to IS NULL OR valid_to >= CURRENT_DATE);
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
