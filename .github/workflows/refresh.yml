name: Weekly Price Refresh

# Désactivé (schedule retiré) — pipeline complet géré par scrape.yml
# Disponible en déclenchement manuel uniquement.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary rapidfuzz python-dotenv requests

      - name: Collect Flipp data
        run: python collector.py

      - name: Import to Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python import_db.py

      - name: Normalize & cluster
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python normalize_products.py

      - name: Trigger Vercel redeploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Vercel redeploy triggered"
          fi
